openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Finca Farm Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: farms
    description: Farm management
  - name: animals
    description: Animal management
  - name: weights
    description: Weight records
  - name: medical
    description: Medical records
  - name: inventory
    description: Inventory management
  - name: activity
    description: Activity log
  - name: zones
    description: Zone management
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    put:
      operationId: updateProfile
      tags: [auth]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /farms:
    get:
      operationId: listFarms
      tags: [farms]
      summary: List farms for current user
      responses:
        "200":
          description: List of farms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farm"
    post:
      operationId: createFarm
      tags: [farms]
      summary: Create a new farm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFarmRequest"
      responses:
        "201":
          description: Created farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /farms/{farmId}:
    get:
      operationId: getFarm
      tags: [farms]
      summary: Get farm details
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Farm details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
    put:
      operationId: updateFarm
      tags: [farms]
      summary: Update farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFarmRequest"
      responses:
        "200":
          description: Updated farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /farms/{farmId}/members:
    get:
      operationId: listFarmMembers
      tags: [farms]
      summary: List farm members
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Farm members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FarmMember"
    post:
      operationId: inviteFarmMember
      tags: [farms]
      summary: Invite a member to farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmMember"

  /farms/{farmId}/members/{userId}:
    delete:
      operationId: removeFarmMember
      tags: [farms]
      summary: Remove a member from farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  /farms/{farmId}/stats:
    get:
      operationId: getFarmStats
      tags: [farms]
      summary: Get farm dashboard stats
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Farm stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmStats"

  /farms/{farmId}/animals:
    get:
      operationId: listAnimals
      tags: [animals]
      summary: List animals for a farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: species
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: breed
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of animals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Animal"
    post:
      operationId: createAnimal
      tags: [animals]
      summary: Add an animal to the farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnimalRequest"
      responses:
        "201":
          description: Created animal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"

  /farms/{farmId}/animals/{animalId}:
    get:
      operationId: getAnimal
      tags: [animals]
      summary: Get animal details
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: animalId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Animal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimalDetail"
    put:
      operationId: updateAnimal
      tags: [animals]
      summary: Update animal
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: animalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnimalRequest"
      responses:
        "200":
          description: Updated animal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"

  /farms/{farmId}/animals/{animalId}/weights:
    get:
      operationId: listWeightRecords
      tags: [weights]
      summary: List weight records for an animal
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: animalId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Weight records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightRecord"
    post:
      operationId: createWeightRecord
      tags: [weights]
      summary: Add weight record
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: animalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeightRecordRequest"
      responses:
        "201":
          description: Created weight record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightRecord"

  /farms/{farmId}/animals/{animalId}/medical:
    get:
      operationId: listMedicalRecords
      tags: [medical]
      summary: List medical records for an animal
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: animalId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Medical records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicalRecord"
    post:
      operationId: createMedicalRecord
      tags: [medical]
      summary: Add medical record
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: animalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicalRecordRequest"
      responses:
        "201":
          description: Created medical record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalRecord"

  /farms/{farmId}/inventory:
    get:
      operationId: listInventoryItems
      tags: [inventory]
      summary: List inventory items
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Add inventory item
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemRequest"
      responses:
        "201":
          description: Created inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /farms/{farmId}/inventory/{itemId}:
    get:
      operationId: getInventoryItem
      tags: [inventory]
      summary: Get inventory item details
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemDetail"
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update inventory item
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /farms/{farmId}/inventory/{itemId}/log:
    post:
      operationId: logInventoryAction
      tags: [inventory]
      summary: Log inventory action (use/restock/adjust)
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogInventoryActionRequest"
      responses:
        "201":
          description: Log entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryLog"

  /farms/{farmId}/activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity log for a farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /farms/{farmId}/zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List zones for a farm
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
    post:
      operationId: createZone
      tags: [zones]
      summary: Create a zone
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"

  /search:
    get:
      operationId: globalSearch
      tags: [farms]
      summary: Global search across animals and inventory
      parameters:
        - name: farmId
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /farms/{farmId}/employees/{employeeId}/attachments:
    get:
      tags: [Employees]
      operationId: listEmployeeAttachments
      summary: List confirmed attachments for an employee
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of confirmed attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeAttachment"
    post:
      tags: [Employees]
      operationId: createEmployeeAttachment
      summary: Create an attachment row and return a presigned GCS upload URL
      description: |
        Two-phase upload lifecycle:
        1. POST this endpoint — creates a DB row with `confirmed=false` and returns a presigned GCS URL (`uploadURL`).
        2. Client PUTs the file directly to `uploadURL`.
        3. Client calls PATCH /confirm — sets `confirmed=true`; the attachment becomes visible in listings.
        Unconfirmed rows (failed/abandoned uploads) are pruned automatically after 1 hour.
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentRequest"
      responses:
        "201":
          description: Attachment row created; upload URL returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAttachmentResponse"

  /farms/{farmId}/employees/{employeeId}/attachments/{attachmentId}/confirm:
    patch:
      tags: [Employees]
      operationId: confirmEmployeeAttachment
      summary: Mark an attachment upload as complete (sets confirmed=true)
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeAttachment"
        "404":
          description: Attachment not found

  /farms/{farmId}/employees/{employeeId}/attachments/{attachmentId}:
    delete:
      tags: [Employees]
      operationId: deleteEmployeeAttachment
      summary: Delete an attachment (DB row + GCS object)
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment deleted
        "404":
          description: Attachment not found

  /farms/{farmId}/employees/{employeeId}/attachments/{attachmentId}/file:
    get:
      tags: [Employees]
      operationId: getEmployeeAttachmentFile
      summary: Stream attachment file (farm-scoped auth, forced download headers)
      parameters:
        - name: farmId
          in: path
          required: true
          schema:
            type: string
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Attachment or file not found

components:
  schemas:
    EmployeeAttachment:
      type: object
      required: [id, employeeId, farmId, fileKey, originalName, mimeType, sizeBytes, confirmed]
      properties:
        id:
          type: string
          format: uuid
        employeeId:
          type: string
          format: uuid
        farmId:
          type: string
          format: uuid
        fileKey:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
        confirmed:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true

    CreateAttachmentRequest:
      type: object
      required: [originalName]
      properties:
        originalName:
          type: string
          minLength: 1
        mimeType:
          type: string
        sizeBytes:
          type: integer

    CreateAttachmentResponse:
      type: object
      required: [attachment, uploadURL]
      properties:
        attachment:
          $ref: "#/components/schemas/EmployeeAttachment"
        uploadURL:
          type: string
          format: uri

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    Profile:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [owner, worker]
        preferredLanguage:
          type: string
        isDemo:
          type: boolean
        createdAt:
          type: string
      required:
        - id

    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        preferredLanguage:
          type: string

    Farm:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        name:
          type: string
        location:
          type: string
        totalHectares:
          type: number
        createdAt:
          type: string
        userRole:
          type: string
      required:
        - id
        - name

    CreateFarmRequest:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        totalHectares:
          type: number
      required:
        - name

    UpdateFarmRequest:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        totalHectares:
          type: number

    FarmMember:
      type: object
      properties:
        id:
          type: string
        farmId:
          type: string
        userId:
          type: string
        role:
          type: string
        permissions:
          type: object
        profile:
          $ref: "#/components/schemas/Profile"
        createdAt:
          type: string
      required:
        - id
        - farmId
        - userId

    InviteMemberRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
          enum: [owner, worker]
      required:
        - email

    FarmStats:
      type: object
      properties:
        totalAnimals:
          type: integer
        animalsBySpecies:
          type: array
          items:
            type: object
            properties:
              species:
                type: string
              count:
                type: integer
        lowStockCount:
          type: integer
        upcomingMedicalCount:
          type: integer
        recentActivityCount:
          type: integer
        employeeCount:
          type: integer
        contactCount:
          type: integer
        pregnantCount:
          type: integer
        upcomingMedicalAnimalIds:
          type: array
          items:
            type: string
        upcomingMedical:
          type: array
          items:
            $ref: "#/components/schemas/MedicalRecord"
        lowStockItems:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
      required:
        - totalAnimals
        - lowStockCount

    Animal:
      type: object
      properties:
        id:
          type: string
        farmId:
          type: string
        customTag:
          type: string
        species:
          type: string
          enum: [cattle, chicken, pig, goat, sheep, horse, other]
        breed:
          type: string
        name:
          type: string
        sex:
          type: string
          enum: [male, female, unknown]
        dateOfBirth:
          type: string
        status:
          type: string
          enum: [active, sold, deceased, transferred]
        photoUrl:
          type: string
        notes:
          type: string
        currentWeight:
          type: number
        currentZoneId:
          type: string
        createdAt:
          type: string
      required:
        - id
        - farmId
        - species

    AnimalDetail:
      allOf:
        - $ref: "#/components/schemas/Animal"
        - type: object
          properties:
            weightRecords:
              type: array
              items:
                $ref: "#/components/schemas/WeightRecord"
            medicalRecords:
              type: array
              items:
                $ref: "#/components/schemas/MedicalRecord"
            offspring:
              type: array
              items:
                $ref: "#/components/schemas/Animal"
            mother:
              $ref: "#/components/schemas/Animal"
            father:
              $ref: "#/components/schemas/Animal"
            linkedCalendarEvents:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  startDate:
                    type: string
                  endDate:
                    type: string
                    nullable: true
                  assignedTo:
                    type: string
                    nullable: true
                  category:
                    type: string
                  color:
                    type: string
                    nullable: true
                required:
                  - id
                  - title
                  - startDate
            pregnancyCount:
              type: integer

    CreateAnimalRequest:
      type: object
      properties:
        customTag:
          type: string
        species:
          type: string
          enum: [cattle, chicken, pig, goat, sheep, horse, other]
        breed:
          type: string
        name:
          type: string
        sex:
          type: string
          enum: [male, female, unknown]
        dateOfBirth:
          type: string
        status:
          type: string
          enum: [active, sold, deceased, transferred]
        motherId:
          type: string
        fatherId:
          type: string
        currentZoneId:
          type: string
        notes:
          type: string
      required:
        - species

    UpdateAnimalRequest:
      type: object
      properties:
        customTag:
          type: string
        species:
          type: string
        breed:
          type: string
        name:
          type: string
        sex:
          type: string
        dateOfBirth:
          type: string
        status:
          type: string
        motherId:
          type: string
        fatherId:
          type: string
        currentZoneId:
