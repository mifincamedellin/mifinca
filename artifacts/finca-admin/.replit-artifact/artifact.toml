kind = "web"
previewPath = "/admin/"
title = "laFinca - Admin Dashboard"
version = "1.0.0"
id = "artifacts/finca-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 22467

[services.development]
run = "pnpm --filter @workspace/finca-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finca-admin", "run", "build" ]
publicDir = "artifacts/finca-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22467"
BASE_PATH = "/admin/"
