appId: com.lafinca.app
productName: laFinca
copyright: Copyright © 2024 laFinca

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - src/*.html
  - package.json

extraResources:
  - from: web-dist
    to: web-dist

# Auto-update feed — hosted in object storage
publish:
  - provider: generic
    url: ${env.LAFINCA_UPDATE_URL}
    channel: latest

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icons/icon.icns
  category: public.app-category.business
  darkModeSupport: true
  # Code signing disabled — users must right-click → Open on first launch,
  # or run: xattr -c laFinca-*.dmg  in Terminal before opening.
  # Enable hardenedRuntime + entitlements only when a Developer ID cert is available.
  identity: null

dmg:
  title: laFinca
  format: UDZO
  writeUpdateInfo: false
  window:
    width: 540
    height: 380

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
  publisherName: laFinca
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # installerIcon: resources/icons/icon.ico
  # uninstallerIcon: resources/icons/icon.ico
