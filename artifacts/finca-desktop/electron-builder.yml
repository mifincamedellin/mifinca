appId: com.mifinca.desktop
productName: miFinca
copyright: Copyright © 2024 miFinca

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - src/*.html
  - package.json

extraResources:
  - from: web-dist
    to: web-dist

# Auto-update feed — hosted in object storage
publish:
  - provider: generic
    url: ${env.MIFINCA_UPDATE_URL}
    channel: latest

mac:
  target:
    - target: dmg
      arch:
        - arm64
  # icon: resources/icons/icon.icns  — place a 512x512 .icns here before shipping
  category: public.app-category.business
  darkModeSupport: true
  # Code signing disabled — users must right-click → Open on first launch,
  # or run: xattr -c miFinca-*.dmg  in Terminal before opening.
  # Enable hardenedRuntime + entitlements only when a Developer ID cert is available.
  identity: null

dmg:
  title: miFinca
  format: UDZO
  writeUpdateInfo: false
  window:
    width: 540
    height: 380

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: resources/icons/icon.ico  — place a 256x256 .ico here before shipping
  publisherName: miFinca
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # installerIcon: resources/icons/icon.ico
  # uninstallerIcon: resources/icons/icon.ico
