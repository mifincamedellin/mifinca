<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>laFinca — Licencia vencida</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2d6a4f;
      --primary-hover: #235c42;
      --bg: #fdfaf7;
      --card: #ffffff;
      --border: #e5e1db;
      --text: #1a1208;
      --muted: #6b5e4e;
      --error: #b91c1c;
      --warn-bg: #fffbeb;
      --warn-border: #fbbf24;
      --warn-text: #92400e;
      --radius: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a120b;
        --card: #231810;
        --border: #3d2e20;
        --text: #f5ede4;
        --muted: #a09080;
        --warn-bg: #2c1d00;
        --warn-border: #78530a;
        --warn-text: #fbbf24;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      user-select: none;
      -webkit-app-region: drag;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      -webkit-app-region: no-drag;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: white; }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--primary);
    }

    .warning-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: var(--warn-text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      width: 100%;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    p.sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      letter-spacing: 0.08em;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      text-transform: uppercase;
    }

    input[type="text"]:focus { border-color: var(--primary); }
    input[type="text"]::placeholder {
      color: var(--muted); opacity: 0.6;
      text-transform: none; letter-spacing: normal;
      font-family: inherit; font-size: 13px;
    }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 10px;
      min-height: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }

    button.primary {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button.primary:hover:not(:disabled) { background: var(--primary-hover); }
    button.primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    button.loading .spinner { display: block; }
    button.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .secondary-action {
      text-align: center;
      margin-top: 14px;
    }
    .secondary-link {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
    }
    .secondary-link:hover { text-decoration: underline; }

    .lang-toggle {
      position: absolute;
      top: 16px; right: 16px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      width: auto;
      margin: 0;
    }
    .lang-toggle:hover { background: var(--bg); }
  </style>
</head>
<body>
  <button class="lang-toggle" onclick="toggleLang()">EN</button>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9a9 9 0 0 1 18 0c0 5.25-4.5 9.75-9 12C7.5 18.75 3 14.25 3 9Z"/></svg>
      </div>
      <span class="logo-text">laFinca</span>
    </div>

    <div class="warning-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span id="badgeText">Licencia vencida</span>
    </div>

    <h1 id="title">Renueva tu acceso</h1>
    <p class="sub" id="sub">Tu licencia anual ha vencido. Adquiere una nueva clave para continuar usando laFinca Desktop o ingresa una clave nueva si ya la tienes.</p>

    <label id="label">Nueva clave de licencia</label>
    <input
      type="text"
      id="keyInput"
      placeholder="XXXXXX-XXXXXX-XXXXXX-XXXXXX"
      autocomplete="off"
      spellcheck="false"
      maxlength="31"
    />

    <p class="error-msg" id="errorMsg"></p>

    <button class="primary" id="renewBtn" onclick="handleRenew()">
      <span class="spinner"></span>
      <span class="btn-text" id="btnText">Activar nueva clave</span>
    </button>

    <div class="secondary-action">
      <a class="secondary-link" onclick="handlePurchase()" id="purchaseLink">Renovar licencia en lafinca.appm →</a>
    </div>
  </div>

  <script>
    const strings = {
      es: {
        badge: "Licencia vencida",
        title: "Renueva tu acceso",
        sub: "Tu licencia anual ha vencido. Adquiere una nueva clave para continuar usando laFinca Desktop o ingresa una clave nueva si ya la tienes.",
        label: "Nueva clave de licencia",
        btn: "Activar nueva clave",
        purchase: "Renovar licencia en lafinca.appm →",
        errors: {
          empty: "Ingresa tu nueva clave.",
          short: "La clave debe tener el formato XXXXXX-XXXXXX-XXXXXX-XXXXXX.",
          not_found: "Clave no encontrada. Verifica que la escribiste correctamente.",
          expired: "Esta clave también ha vencido. Adquiere una clave más reciente.",
          revoked: "Esta clave ha sido revocada. Contáctanos para soporte.",
          already_claimed: "Esta clave está asociada a otra cuenta.",
          offline: "Sin conexión. Verifica tu internet e intenta de nuevo.",
          invalid: "Clave inválida. Verifica que la escribiste correctamente.",
          network: "Error de red. Intenta de nuevo.",
        },
      },
      en: {
        badge: "License expired",
        title: "Renew your access",
        sub: "Your annual license has expired. Purchase a new key to continue using laFinca Desktop, or enter a new key if you already have one.",
        label: "New license key",
        btn: "Activate new key",
        purchase: "Renew license at lafinca.appm →",
        errors: {
          empty: "Enter your new license key.",
          short: "Key must follow the format XXXXXX-XXXXXX-XXXXXX-XXXXXX.",
          not_found: "Key not found. Check that you typed it correctly.",
          expired: "This key has also expired. Please obtain a more recent key.",
          revoked: "This key has been revoked. Contact us for support.",
          already_claimed: "This key is linked to another account.",
          offline: "No connection. Check your internet and try again.",
          invalid: "Invalid key. Check that you typed it correctly.",
          network: "Network error. Please try again.",
        },
      },
    };

    let lang = navigator.language.startsWith("en") ? "en" : "es";

    function applyLang() {
      const s = strings[lang];
      document.getElementById("badgeText").textContent = s.badge;
      document.getElementById("title").textContent = s.title;
      document.getElementById("sub").textContent = s.sub;
      document.getElementById("label").textContent = s.label;
      document.getElementById("btnText").textContent = s.btn;
      document.getElementById("purchaseLink").textContent = s.purchase;
      document.querySelector(".lang-toggle").textContent = lang === "es" ? "EN" : "ES";
    }

    function toggleLang() {
      lang = lang === "es" ? "en" : "es";
      applyLang();
    }

    applyLang();

    const input = document.getElementById("keyInput");
    input.addEventListener("input", (e) => {
      let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      let formatted = "";
      for (let i = 0; i < val.length && i < 24; i++) {
        if (i > 0 && i % 6 === 0) formatted += "-";
        formatted += val[i];
      }
      e.target.value = formatted;
    });

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.classList.add("visible");
    }

    function clearError() {
      document.getElementById("errorMsg").classList.remove("visible");
    }

    function setLoading(loading) {
      const btn = document.getElementById("renewBtn");
      if (loading) btn.classList.add("loading");
      else btn.classList.remove("loading");
      btn.disabled = loading;
    }

    async function handleRenew() {
      clearError();
      const key = document.getElementById("keyInput").value.trim();
      const s = strings[lang];

      if (!key) { showError(s.errors.empty); return; }
      if (key.replace(/-/g, "").length < 24) { showError(s.errors.short); return; }

      setLoading(true);
      try {
        const result = await window.laFincaDesktop.renewLicense(key);
        if (result.ok) {
          window.laFincaDesktop.renewalComplete();
        } else {
          const reason = result.error ?? "invalid";
          showError(s.errors[reason] ?? s.errors.invalid);
        }
      } catch {
        showError(s.errors.network);
      } finally {
        setLoading(false);
      }
    }

    function handlePurchase() {
      window.laFincaDesktop.openPurchase();
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleRenew();
    });
  </script>
</body>
</html>
