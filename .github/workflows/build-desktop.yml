name: Build Desktop Installers

# Runs whenever you push a version tag like v1.0.0
# Also runs on every push to main so you can verify the build works
on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: write   # required to create GitHub Releases and upload assets

# ── macOS (.dmg — Intel + Apple Silicon) ─────────────────────────────────────
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm --filter @workspace/finca-desktop exec electron-builder install-app-deps

      - name: Build .dmg
        env:
          # Point the app at your production API — set this secret in GitHub:
          # repo Settings → Secrets → Actions → New repository secret
          MIFINCA_API_URL: ${{ secrets.MIFINCA_API_URL }}
          # Placeholder — auto-update can be wired up later
          MIFINCA_UPDATE_URL: "https://github.com/${{ github.repository }}/releases/latest"
        run: pnpm --filter @workspace/finca-desktop build

      # On a version tag: attach .dmg files to a GitHub Release
      - name: Upload .dmg to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/finca-desktop/release/*.dmg

      # On a branch push: save as a downloadable workflow artifact (7-day expiry)
      - name: Upload .dmg as workflow artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: mifinca-mac
          path: artifacts/finca-desktop/release/*.dmg
          retention-days: 7

# ── Windows (.exe installer) ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm --filter @workspace/finca-desktop exec electron-builder install-app-deps

      - name: Build .exe installer
        env:
          MIFINCA_API_URL: ${{ secrets.MIFINCA_API_URL }}
          MIFINCA_UPDATE_URL: "https://github.com/${{ github.repository }}/releases/latest"
        run: pnpm --filter @workspace/finca-desktop build

      - name: Upload .exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/finca-desktop/release/*.exe

      - name: Upload .exe as workflow artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: mifinca-windows
          path: artifacts/finca-desktop/release/*.exe
          retention-days: 7
