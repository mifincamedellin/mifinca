name: Build Desktop Installers

on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: write

jobs:
  # ── Step 1: Build the web app on Linux (avoids macOS/Windows Rollup binary issues) ──
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile Electron TypeScript
        run: pnpm --filter @workspace/finca-desktop compile

      - name: Build finca-web
        run: pnpm --filter @workspace/finca-web build
        env:
          BASE_PATH: "/"
          PORT: "3000"
          NODE_ENV: production
          VITE_API_BASE: ${{ secrets.MIFINCA_API_URL }}

      # Upload each output directly to its destination path
      - name: Upload web-dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: artifacts/finca-web/dist/public/

      - name: Upload electron-dist
        uses: actions/upload-artifact@v4
        with:
          name: electron-dist
          path: artifacts/finca-desktop/dist/

  # ── Step 2a: Package macOS .dmg ─────────────────────────────────────────────
  build-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Download directly to the right locations — no copy needed
      - name: Download web-dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: artifacts/finca-desktop/web-dist/

      - name: Download electron-dist
        uses: actions/download-artifact@v4
        with:
          name: electron-dist
          path: artifacts/finca-desktop/dist/

      - name: Rebuild native modules for Electron
        run: pnpm --filter @workspace/finca-desktop exec electron-builder install-app-deps

      - name: Package .dmg
        run: pnpm --filter @workspace/finca-desktop electron:build
        env:
          MIFINCA_UPDATE_URL: "https://github.com/${{ github.repository }}/releases/latest"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload .dmg to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/finca-desktop/release/*.dmg

      - name: Save .dmg as workflow artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: mifinca-mac
          path: artifacts/finca-desktop/release/*.dmg
          retention-days: 7

  # ── Step 2b: Package Windows .exe ───────────────────────────────────────────
  build-windows:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download web-dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: artifacts/finca-desktop/web-dist/

      - name: Download electron-dist
        uses: actions/download-artifact@v4
        with:
          name: electron-dist
          path: artifacts/finca-desktop/dist/

      - name: Rebuild native modules for Electron
        run: pnpm --filter @workspace/finca-desktop exec electron-builder install-app-deps

      - name: Package .exe
        run: pnpm --filter @workspace/finca-desktop electron:build
        env:
          MIFINCA_UPDATE_URL: "https://github.com/${{ github.repository }}/releases/latest"

      - name: Upload .exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/finca-desktop/release/*.exe

      - name: Save .exe as workflow artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: mifinca-windows
          path: artifacts/finca-desktop/release/*.exe
          retention-days: 7
